name: Engineering QA Assistant
owner: Quality Engineering
stage: prototype
description: >
  AI-assisted workflow for comparing inspection evidence with QA procedures,
  surfacing similar historical defects, and preparing review notes for quality engineers.

business:
  problem: Quality engineers spend too much time searching past issues and procedures.
  expected_impact: Reduce investigation time while keeping human sign-off for quality decisions.
  users:
    - Quality Engineers
    - Manufacturing Engineers
    - Maintenance Leads
  external_output: false
  revenue_or_cost_impact: high

data:
  sources:
    - QA procedures
    - Inspection records
    - Historical defect notes
  data_classification: confidential
  freshness_required: true
  access_control_required: true
  pii_or_sensitive_data: false

rag:
  uses_rag: true
  chunking_strategy_defined: partial
  source_citations_required: true
  retrieval_evaluation_exists: false
  rbac_filtered_retrieval: partial

model_architecture:
  providers:
    - Azure OpenAI
  model_router: false
  fallback_model: false
  prompt_versioning: partial
  business_logic_in_prompts: true

governance:
  rbacs_defined: partial
  audit_logs: partial
  privacy_review_done: partial
  legal_review_done: false
  compliance_gates: partial

human_in_the_loop:
  required: true
  approval_before_external_use: true
  escalation_defined: partial
  reviewer_role: Quality Engineer

evals:
  golden_dataset_exists: false
  regression_tests: false
  hallucination_tests: partial
  safety_tests: partial

observability:
  token_tracking: partial
  latency_tracking: partial
  error_tracking: true
  cost_dashboard: false
  prompt_response_tracing: partial

operations:
  incident_owner_defined: partial
  rollback_plan: false
  support_process: false
  change_management: partial

adoption:
  training_materials: false
  user_guides: partial
  feedback_loop: partial
  adoption_metrics: false
