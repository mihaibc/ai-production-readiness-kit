name: Research Knowledge Base Curator
owner: Research Operations Team
stage: limited_production
description: >
  Internal workflow that ingests synthetic research notes, classifies topics,
  identifies stale content, recommends archive or review actions, and maintains
  a searchable knowledge base for research and product teams.

business:
  problem: Research notes become hard to reuse when topics, freshness, and ownership are not maintained.
  expected_impact: Improve reuse of research knowledge and reduce duplicate discovery work.
  users:
    - Researchers
    - Product managers
    - Knowledge managers
  external_output: false
  revenue_or_cost_impact: medium

data:
  sources:
    - Synthetic research notes
    - Public sample interview summaries
    - Topic taxonomy files
    - Archive review logs
  data_classification: internal
  freshness_required: true
  access_control_required: true
  pii_or_sensitive_data: false

rag:
  uses_rag: true
  chunking_strategy_defined: true
  source_citations_required: true
  retrieval_evaluation_exists: true
  rbac_filtered_retrieval: true

model_architecture:
  providers:
    - Generic LLM provider
  model_router: partial
  fallback_model: partial
  prompt_versioning: true
  business_logic_in_prompts: false

governance:
  rbacs_defined: true
  audit_logs: true
  privacy_review_done: true
  legal_review_done: partial
  compliance_gates: partial

human_in_the_loop:
  required: false
  approval_before_external_use: false
  escalation_defined: true
  reviewer_role: Knowledge Manager

evals:
  golden_dataset_exists: true
  regression_tests: true
  hallucination_tests: partial
  safety_tests: true

observability:
  token_tracking: true
  latency_tracking: true
  error_tracking: true
  cost_dashboard: true
  prompt_response_tracing: partial

operations:
  incident_owner_defined: true
  rollback_plan: true
  support_process: true
  change_management: partial

adoption:
  training_materials: true
  user_guides: true
  feedback_loop: true
  adoption_metrics: true
